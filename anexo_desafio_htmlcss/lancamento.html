<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/header-grid.css">
    <link rel="stylesheet" href="css/main_lancamento.css">
    <link rel="stylesheet" href="css/footer-grid.css">
    <link rel="stylesheet" href="css/reset.css">
    <title>Document</title>
</head>

<body class="body-container">

    <header class="header-container">
        <figure class="logo">
            <img src="img/logo-ford-256.png" alt="Ford">
        </figure>
        <nav class="nav-bar">
            <a href="HOME.html">HOME</a>
            <a href="lancamento.html">LANÇAMENTO</a>
            <a href="#">CONTATO</a>
        </nav>
    </header>

    <main class="main-container">

        <iframe class="video" src="https://www.youtube.com/embed/vQsryuNmsL0" title="Ford Ranger 2022 | Gerações"
            frameborder="0"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
            referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>

        <div class="card-group">

            <div class="card">
                <figure class="imagem-carro">
                    <img src="img/XL Cabine.jpg" alt="XL cabine carro">
                </figure>

                <section class="informacoes">
                    <div class="info_carro">
                        <input type="checkbox" name="carro" id="carro">
                        <div class="paragrafo">
                            <p>XL Cabine Simples 2.2 Diesel 4x4 MT 2022</p>
                            <p>Preço Sugerido: R$183.850</p>
                        </div>
                        <figure>
                            <img src="img/info.png" alt="Informação">
                        </figure>
                    </div>

                </section>
            </div>

            <div class="card">
                <figure class="imagem-carro">
                    <img src="img/XL Cabine.jpg" alt="XL cabine carro">
                </figure>

                <section class="informacoes">
                    <div class="info_carro">
                        <input type="checkbox" name="carro" id="carro">
                        <div class="paragrafo">
                            <p>XL Cabine Simples 2.2 Diesel 4x4 MT 2022</p>
                            <p>Preço Sugerido: R$183.850</p>
                        </div>
                        <figure>
                            <img src="img/info.png" alt="Informação">
                        </figure>
                    </div>
                </section>
            </div>

            <div class="card">
                <figure class="imagem-carro">
                    <img src="img/XL Cabine.jpg" alt="XL cabine carro">
                </figure>

                <section class="informacoes">
                    <div class="info_carro">
                        <input type="checkbox" name="carro" id="carro">
                        <div class="paragrafo">
                            <p><span>XL Cabine Simples 2.2 Diesel 4x4 MT 2022</span></p>
                            <p>Preço Sugerido: R$183.850</p>
                        </div>
                        <figure>
                            <img src="img/info.png" alt="Informação">
                        </figure>
                    </div>
                </section>
            </div>

        </div>

        <div class="button">
            <button type="button">Comparar Agora</button>
        </div>

    </main>

    <footer class="footer-container">
        <figure class="imagens-logos">
            <p>Redes sociais:</p>
            <img src="img/facebook-50.png" alt="Facebook logo">

            <img src="img/youtube-squared-50.png" alt="Youtube logo">

            <img src="img/instagram-logo-50.png" alt="Instagram Logo">


        </figure>
        <img class="ford-logo-footer" src="img/ford-96.png" alt="">
    </footer>
</body>

</html>
