<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="img/ford-icone.svg">
    <link rel="stylesheet" href="css/header-grid.css">
    <link rel="stylesheet" href="css/footer-grid.css">
    <link rel="stylesheet" href="css/main_contato.css">
    <title>Ford</title>
</head>

<body class="body">

    <header class="header-container">
        <figure class="logo">
            <img src="img/logo-ford-256.png" alt="Ford">
        </figure>
        <nav class="nav-bar">
            <a href="HOME.html">HOME</a>
            <a href="lancamento.html">LANÇAMENTO</a>
            <a href="#">CONTATO</a>
        </nav>
    </header>


    <main class="main">
        <figure class="item imagem">
            <img src="img/xls 2.2 diesel.jpg" alt="">
        </figure>
        <form action="" class="item forms">
            <section class="formulario">
                <h3>Sobre você</h3>

                <input type="text" id="nome" placeholder="Digite seu nome">

                <input type="email" id="email" placeholder="Digite seu email">

                <input type="text" id="cpf" placeholder="000.000.000-00">

                <input type="text" id="sobrenome" placeholder="Digite seu sobrenome">

                <input type="tel" id="telefone" placeholder="(11) 99999-9999">
            </section>
            <button type="button">Enviar</button>
        </form>
    </main>

    <footer class="footer-container">
        <figure class="imagens-logos">
            <p>Redes sociais:</p>
            <img src="img/facebook-50.png" alt="Facebook logo">

            <img src="img/youtube-squared-50.png" alt="Youtube logo">

            <img src="img/instagram-logo-50.png" alt="Instagram Logo">


        </figure>
        <img class="ford-logo-footer" src="img/ford-96.png" alt="">
    </footer>
</body>

</html>
