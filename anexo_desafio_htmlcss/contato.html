<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="img/ford-icone.svg">
    <link rel="stylesheet" href="css/teste_header.css">
    <link rel="stylesheet" href="css/footer-grid.css">
    <link rel="stylesheet" href="css/main_contato.css">
    <title>Ford</title>
</head>

<body class="body">

    <header class="header-container">
        <figure class="logo">
            <img src="img/logo-ford-256.png" alt="Ford">
        </figure>
        <nav class="nav-bar">
            <a href="HOME.html">HOME</a>
            <a href="lancamento.html">LANÇAMENTO</a>
            <a href="#">CONTATO</a>
        </nav>
    </header>


    <main class="main">

        <figure class="item imagem">
            <img src="img/xls 2.2 diesel.jpg" alt="">
        </figure>

        <form action="" class="item forms">

            <section class="formulario">
                <h3>Sobre você</h3>

                <input type="text" id="nome" placeholder="NOME*">

                <input type="email" id="email" placeholder="EMAIL*">

                <input type="tel" id="telefone" placeholder="(11) 99999-9999">

                <select name="seleciona" id="selecao">
                    <option value="vazio" disabled></option>
                    <option value="elogio">Elogio</option>
                    <option value="reclamação">Reclamação</option>
                    <option value="solicitação">Solicitação</option>
                </select>

                <textarea name="mensagem" id="mensagem" placeholder="mensagem*"></textarea>
                <button type="button">Enviar</button>
            </section>
            
        </form>
    </main>

    <footer class="footer-container">

        <section class="redes">
            <p>Redes sociais:</p>
        </section>

        <figure class="imagens-logos">

            <a href="https://www.facebook.com/ford"><img src="img/facebook-50.png" alt="Facebook logo"></a>

            <a href="https://www.youtube.com/user/ford"><img src="img/youtube-squared-50.png" alt="Youtube logo"></a>

            <a href="https://www.instagram.com/fordbrasil/"><img src="img/instagram-logo-50.png"
                    alt="Instagram Logo"></a>

        </figure>

        <article class="direitos">
            <p class="direitos">&copy;Todos os direitos reservados</p>
        </article>

        <article class="ford-logo-footer">
            <img src="img/ford-96.png" alt="">
        </article>

    </footer>

</body>

</html>
